<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface fixed top-0 w-full z-50 shadow-sm transition-all duration-300">
<div class="flex items-center justify-between px-margin-mobile w-full h-14">
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors active:scale-95 duration-100 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary dark:text-primary-fixed">Community</h1>
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors active:scale-95 duration-100 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">search</span>
</button>
</div>
<!-- Tabs -->
<nav class="flex border-b border-surface-variant dark:border-surface-variant overflow-x-auto hide-scrollbar">
<button class="flex-1 py-3 text-center border-b-2 border-primary text-primary font-label-md text-label-md transition-colors relative">
                Latest
            </button>
<button class="flex-1 py-3 text-center border-b-2 border-transparent text-on-surface-variant hover:text-on-surface hover:bg-surface-container-low transition-colors font-label-md text-label-md">
                Hot
            </button>
<button class="flex-1 py-3 text-center border-b-2 border-transparent text-on-surface-variant hover:text-on-surface hover:bg-surface-container-low transition-colors font-label-md text-label-md">
                Featured
            </button>
</nav>
</header>
<!-- Main Canvas -->
<main class="flex-1 overflow-y-auto mt-24 mb-20 px-margin-mobile py-4 space-y-md">
<!-- Post Card -->
<article class="bg-surface-container-lowest rounded-xl shadow-sm p-md border border-surface-variant/50">
<!-- Header -->
<div class="flex items-center justify-between mb-sm">
<div class="flex items-center space-x-sm">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container flex-shrink-0">
<img alt="Avatar" class="w-full h-full object-cover" data-alt="A close up portrait of a fluffy tabby cat looking curiously at the camera, set against a soft blurred background, captured with bright natural lighting and a modern crisp photographic style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWaPe2WUnVMZ2BMJtni0SQzGihNa_epn2Fk5sXwliZxeWkh-rrkkNw1_a9vBHlkJBCv2Dq2Ka9d5Rw9ZPidfDsF4sZVA-pW36OExTAD5iwccv6GgW-1v6m1NQU5BUtTXwUpqBoWaioI899ZWmNiSaHY5rwmzUzUcpMs9SOogyEz5UTIHZFDQe7y35EOjjAyN29Ww6HQAWwJVKWqxqBO7uj4POPI-4YplM7PMGp4xBa46_DiZsBD7mCaWvSPmZ-Ut4g7aiiEgs5dcw"/>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface">test</h3>
<p class="font-body-md text-[12px] text-on-surface-variant">6-3 10:19</p>
</div>
</div>
<span class="px-2 py-1 rounded border border-primary text-primary font-label-md text-[10px]">Product Review</span>
</div>
<!-- Content -->
<div class="mb-md">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xs">Shopping Experience</h2>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-3">The mall has a great selection of goods. Found everything I needed and the staff was very helpful. Will definitely return next weekend!</p>
</div>
<!-- Metrics -->
<div class="flex items-center justify-between text-on-surface-variant font-body-md text-[13px] pt-sm border-t border-surface-variant/30">
<div class="flex items-center space-x-1 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">visibility</span>
<span>124</span>
</div>
<div class="flex items-center space-x-1 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">thumb_up</span>
<span>42</span>
</div>
<div class="flex items-center space-x-1 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">chat</span>
<span>8</span>
</div>
</div>
</article>
<!-- No More Content -->
<div class="py-lg text-center font-body-md text-on-surface-variant/70">
            No more posts
        </div>
</main>
<!-- Floating Action Button -->
<button class="fixed bottom-24 right-margin-mobile w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center hover:bg-primary-container active:scale-95 transition-all duration-200 z-40">

<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest active:scale-90 duration-200 p-2 rounded-lg min-w-[64px]">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-label-md text-label-md">Home</span>
</button>

<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">groups</span>
<span class="font-label-md text-label-md">Community</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest active:scale-90 duration-200 p-2 rounded-lg min-w-[64px]">
<span class="material-symbols-outlined mb-1">chat_bubble</span>

<span class="material-symbols-outlined mr-3">home</span>
<span class="font-label-md text-label-md">Home</span>
</button>
<button class="flex items-center w-full px-4 py-3 bg-secondary-container text-on-secondary-container rounded-lg transition-colors font-bold">
<span class="material-symbols-outlined mr-3" style="font-variation-settings: 'FILL' 1;">groups</span>
<span class="font-label-md text-label-md">Community</span>
</button>
<button class="flex items-center w-full px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors">
<span class="material-symbols-outlined mr-3">chat_bubble</span>
<span class="font-label-md text-label-md">Inquiry</span>
</button>
<button class="flex items-center w-full px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors">
