            background-color: theme('colors.background');
            -webkit-tap-highlight-color: transparent;

            background: linear-gradient(145deg, theme('colors.surface-container-lowest'), theme('colors.surface-container-low'));

    body {
      min-height: max(884px, 100dvh);

<body class="antialiased text-on-surface min-h-screen flex flex-col pb-[100px]">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-margin-mobile h-16 w-full bg-surface top-0 sticky z-20">
<!-- Leading Action (Back) -->
<button class="w-10 h-10 flex items-center justify-center text-primary hover:bg-surface-container-low rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<!-- Headline -->
<h1 class="font-headline-sm text-headline-sm font-bold text-on-surface flex-1 text-center truncate px-2">商品备忘本</h1>
<!-- Trailing Action (Add) -->
<button class="w-10 h-10 flex items-center justify-center text-primary hover:bg-surface-container-low rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined">add</span>
</button>
</header>
<!-- Tab Bar -->
<div class="flex justify-center bg-surface sticky top-16 z-10 shadow-sm border-b border-surface-variant/40">
<button class="relative py-3 px-8 font-label-md text-label-md text-primary font-bold active:scale-95 transition-transform">
            全部
            <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-1 bg-primary rounded-t-full"></span>
</button>
</div>
<!-- Main Content Canvas (Empty State) -->
<main class="flex-1 flex flex-col items-center justify-center p-margin-mobile min-h-[530px]">
<!-- Soft Empty State Illustration -->
<div class="relative flex items-center justify-center w-48 h-48 mb-6">
<!-- Ambient Blur -->
<div class="absolute inset-0 bg-surface-variant/30 rounded-full blur-2xl scale-75"></div>
<!-- Floating Document Card -->
<div class="relative z-10 empty-state-bg border border-surface-variant/50 w-28 h-36 rounded-xl shadow-[0_8px_24px_rgba(0,0,0,0.04)] flex flex-col items-center p-4">
<div class="w-full h-1 bg-surface-variant/50 rounded-full mb-3 mt-2"></div>
<div class="w-3/4 h-1 bg-surface-variant/50 rounded-full mb-3 self-start"></div>
<div class="w-5/6 h-1 bg-surface-variant/50 rounded-full mb-auto self-start"></div>
<!-- Bottom stylized "drawer" or fold detail -->
<div class="w-full h-8 bg-surface-variant/20 rounded-b-lg mt-4 flex items-center justify-center">
<div class="w-6 h-1 bg-surface-variant/60 rounded-full"></div>
</div>
</div>
<!-- Secondary floating element (subtle) -->
<div class="absolute right-4 bottom-4 w-12 h-12 bg-surface-container-lowest rounded-lg shadow-sm border border-surface-variant/40 flex items-center justify-center -rotate-6 z-0">
<span class="material-symbols-outlined text-surface-variant opacity-50">description</span>
</div>
</div>
<!-- Empty State Message -->
<p class="font-body-md text-body-md text-secondary text-center tracking-wide">暂无备忘记录</p>
</main>
<!-- BottomNavBar (Shared Component) -->
<nav class="fixed bottom-0 w-full z-50 backdrop-blur-md bg-surface/80 border-t border-surface-variant/20 flex justify-around items-center h-20 px-4 pb-safe shadow-[0_-4px_16px_rgba(0,0,0,0.02)]">
<!-- Stores Tab (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-surface-variant/20 rounded-xl active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined mb-1">storefront</span>
<span class="font-label-md text-label-md">Stores</span>
</button>
<!-- List Tab (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-surface-variant/20 rounded-xl active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined mb-1">format_list_bulleted</span>
<span class="font-label-md text-label-md">List</span>
</button>
<!-- Memos Tab (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-6 py-1.5 hover:bg-surface-variant/20 active:scale-90 transition-all duration-200 shadow-sm">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">sticky_note_2</span>
<span class="font-label-md text-label-md">Memos</span>
</button>
