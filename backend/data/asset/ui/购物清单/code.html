<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shopping List - Retail Nexus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#dce0e4",
                    "secondary": "#5a5f62",
                    "on-secondary-container": "#5e6367",
                    "inverse-primary": "#80d2e8",
                    "tertiary-fixed": "#ffdbd0",
                    "background": "#f9f9fc",
                    "secondary-fixed-dim": "#c3c7cb",
                    "tertiary-container": "#b04e2e",
                    "on-secondary-fixed": "#171c1f",
                    "surface-container": "#eeeef0",
                    "surface-dim": "#dadadc",
                    "primary": "#005c6c",
                    "on-primary-container": "#d1f4ff",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#ffe9e4",
                    "surface-tint": "#00687a",
                    "secondary-fixed": "#dfe3e7",
                    "primary-container": "#0e768a",
                    "surface-container-low": "#f3f3f6",
                    "on-primary-fixed": "#001f26",
                    "on-primary": "#ffffff",
                    "surface-variant": "#e2e2e5",
                    "surface-container-high": "#e8e8ea",
                    "on-surface": "#1a1c1e",
                    "inverse-on-surface": "#f0f0f3",
                    "on-tertiary-fixed": "#3a0b00",
                    "on-error-container": "#93000a",
                    "outline": "#6f797c",
                    "on-tertiary-fixed-variant": "#7f2a0d",
                    "primary-fixed-dim": "#80d2e8",
                    "tertiary": "#903719",
                    "on-primary-fixed-variant": "#004e5c",
                    "inverse-surface": "#2f3133",
                    "on-background": "#1a1c1e",
                    "surface": "#f9f9fc",
                    "surface-container-highest": "#e2e2e5",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#ffb59e",
                    "on-secondary-fixed-variant": "#43474b",
                    "surface-bright": "#f9f9fc",
                    "error": "#ba1a1a",
                    "outline-variant": "#bec8cc",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3f484b",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#acedff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "md": "16px",
                    "xs": "4px",
                    "sm": "8px",
                    "base": "4px",
                    "margin-desktop": "40px",
                    "gutter": "16px",
                    "margin-mobile": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "headline-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                    "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                    "headline-lg-mobile": ["26px", { "lineHeight": "32px", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                    "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        /* Soft L1 Shadow from guidelines */
        .shadow-l1 {
            box-shadow: 0px 4px 12px rgba(0,0,0,0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col font-sans selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Contextual for Sub-screen) -->
<header class="bg-surface w-full top-0 sticky flex flex-col md:hidden z-40 transition-colors">
<div class="flex items-center justify-between px-margin-mobile h-16 w-full">
<button class="flex items-center text-primary font-body-md hover:bg-surface-container-low p-2 -ml-2 rounded-lg transition-colors active:scale-95">
<span class="material-symbols-outlined mr-1" style="font-size: 20px;">arrow_back_ios_new</span>
                返回
            </button>
<h1 class="font-headline-sm text-headline-sm font-bold text-on-surface absolute left-1/2 transform -translate-x-1/2">
                我的购物清单
            </h1>
<div class="w-12"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-lg pb-24 md:max-w-2xl md:mx-auto md:w-full">
<!-- Add Item Card -->
<div class="bg-surface shadow-l1 rounded-xl p-2 flex items-center mb-lg border border-transparent focus-within:border-primary/30 transition-all duration-300">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface font-body-md px-sm placeholder-secondary/60" placeholder="添加想买的物品..." type="text"/>
<button class="bg-primary text-on-primary px-lg py-sm rounded-lg font-label-md hover:bg-surface-tint transition-colors active:scale-95 shadow-sm">
                添加
            </button>
</div>
<!-- List Section -->
<section class="flex flex-col gap-sm">
<!-- Date Header -->
<div class="px-sm mb-xs mt-sm">
<h2 class="font-label-md text-label-md text-secondary">2026-06-03</h2>
</div>
<!-- List Item Card 1 -->
<div class="bg-surface shadow-l1 rounded-xl p-md flex items-center justify-between group hover:shadow-md transition-shadow duration-300">
<div class="flex items-center gap-md flex-1 cursor-pointer">
<span class="material-symbols-outlined text-secondary/50 group-hover:text-primary transition-colors">radio_button_unchecked</span>
<span class="font-body-md text-on-surface">买一送一</span>
</div>
<button class="text-error/60 hover:text-error hover:bg-error-container/50 p-sm rounded-full transition-all active:scale-90">
<span class="material-symbols-outlined" style="font-size: 20px;">delete_outline</span>
</button>
</div>
<!-- Additional Item for context (Optional but good for layout) -->
<div class="bg-surface shadow-l1 rounded-xl p-md flex items-center justify-between group hover:shadow-md transition-shadow duration-300">
<div class="flex items-center gap-md flex-1 cursor-pointer">
<span class="material-symbols-outlined text-secondary/50 group-hover:text-primary transition-colors">radio_button_unchecked</span>
<span class="font-body-md text-on-surface">新鲜牛奶</span>
</div>
<button class="text-error/60 hover:text-error hover:bg-error-container/50 p-sm rounded-full transition-all active:scale-90">
<span class="material-symbols-outlined" style="font-size: 20px;">delete_outline</span>
</button>
</div>
<!-- Completed Item Example -->
<div class="bg-surface shadow-l1 rounded-xl p-md flex items-center justify-between opacity-60">
<div class="flex items-center gap-md flex-1 cursor-pointer">
<span class="material-symbols-outlined text-primary fill">check_circle</span>
<span class="font-body-md text-secondary line-through">全麦面包</span>
</div>
<button class="text-error/40 hover:text-error hover:bg-error-container/50 p-sm rounded-full transition-all active:scale-90">
<span class="material-symbols-outlined" style="font-size: 20px;">delete_outline</span>
</button>
</div>
</section>
</main>
<!-- Bottom Nav Bar (From JSON, executing styles. Active Tab: List) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 backdrop-blur-md bg-surface/70 shadow-[0_-4px_16px_rgba(0,0,0,0.02)] flex justify-around items-center h-20 px-4 pb-safe border-t border-surface-variant/20">
<!-- Inactive: Stores -->
<a class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-surface-variant/20 transition-colors rounded-xl active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">storefront</span>
<span class="font-label-md text-label-md">Stores</span>
</a>
<!-- Active: List -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-1.5 shadow-sm active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1 fill text-primary">format_list_bulleted</span>
<span class="font-label-md text-label-md font-bold text-primary">List</span>
</a>
<!-- Inactive: Memos -->
<a class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-surface-variant/20 transition-colors rounded-xl active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">sticky_note_2</span>
<span class="font-label-md text-label-md">Memos</span>
</a>
</nav>
<script>
        // Simple JS for interaction demonstration
        document.querySelectorAll('.group .material-symbols-outlined').forEach(icon => {
            if(icon.textContent === 'radio_button_unchecked') {
                icon.parentElement.addEventListener('click', function() {
                    const textSpan = this.querySelector('.font-body-md');
                    if (icon.textContent === 'radio_button_unchecked') {
                        icon.textContent = 'check_circle';
                        icon.classList.add('fill', 'text-primary');
                        icon.classList.remove('text-secondary/50');
                        textSpan.classList.add('line-through', 'text-secondary');
                        textSpan.classList.remove('text-on-surface');
                        this.parentElement.classList.add('opacity-60');
                    } else {
                        icon.textContent = 'radio_button_unchecked';
                        icon.classList.remove('fill', 'text-primary');
                        icon.classList.add('text-secondary/50');
                        textSpan.classList.remove('line-through', 'text-secondary');
                        textSpan.classList.add('text-on-surface');
                        this.parentElement.classList.remove('opacity-60');
                    }
                });
            }
        });
    </script>
</body></html>
